<!DOCTYPE html>
<html>
<head>
  <title>Travel Planner</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #f5f5f5;
      color: black;
      text-align: center;
    }

    .dark {
      background-color: #121212;
      color: white;
    }

    .navbar {
      background-color: white;
      padding: 15px;
    }

    .dark .navbar {
      background-color: #1e1e1e;
    }

    .navbar a {
      margin: 10px;
      text-decoration: none;
      color: black;
    }

    .dark .navbar a {
      color: white;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    .main-btn {
      background-color: teal;
      color: white;
    }

    .secondary-btn {
      background-color: white;
      border: 1px solid gray;
    }

    .dark .secondary-btn {
      background-color: #2a2a2a;
      color: white;
      border: 1px solid gray;
    }

    .section {
      padding: 80px 20px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <b>Go2TravelPlanner</b>
    <br><br>

    <a href="#">Home</a>
    <a href="#">Cities</a>
    <a href="#">Activities</a>
    <a href="#">My Trips</a>

    <button onclick="toggleTheme()">🌙</button>
  </div>

  <div class="section">
    <h1>Plan Your Dream Journey</h1>
    <p>Discover amazing places and plan your trips easily.</p>
    <button class="main-btn">Start Exploring</button>
    <button class="secondary-btn">My Trips</button>
  </div>

  <div class="section">
    <h2>Everything You Need to Plan</h2>
    <p>All the tools to create the perfect trip</p>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle("dark");
      if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
      } else {
        localStorage.setItem("theme", "light");
      }
    }

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }
  </script>

</body>
</html>
